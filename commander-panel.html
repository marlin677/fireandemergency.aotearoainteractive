<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Operational Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #111a2e;
            --row-bg: #162036;
            --border-color: #2d3a54;
            --btn-bg: #1a253d;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
            font-family: 'Industry-BoldItalic', sans-serif;
            text-transform: uppercase;
        }

        /* --- NAVIGATION TABS --- */
        .roster-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .nav-item {
            text-decoration: none;
            color: white;
            background: var(--btn-bg);
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        /* --- MODIFIER DROPDOWN BUTTON --- */
        .modify-toggle {
            background: var(--fenz-red);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-family: 'Industry-BoldItalic';
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .modify-toggle:hover {
            background: #b91c1c;
            box-shadow: 0 0 15px rgba(212, 32, 39, 0.4);
        }

        /* --- HIDDEN DROPDOWN SECTION --- */
        #modifier-section {
            display: none; /* Hidden by default */
            background: var(--table-header);
            padding: 25px;
            border-radius: 4px;
            border-top: 3px solid var(--fenz-red);
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input, select {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: white;
            font-family: 'Industry-BoldItalic';
            flex: 1;
            border-radius: 2px;
        }

        .btn-update {
            background: var(--fenz-yellow);
            color: black;
            border: none;
            padding: 12px 25px;
            font-weight: 900;
            font-family: 'Industry-BoldItalic';
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-update:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* --- TABLE --- */
        .master-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: var(--table-header);
            color: #94a3b8;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 15px;
            background: var(--row-bg);
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover td {
            background: rgba(255, 237, 0, 0.05);
        }

        .btn-remove {
            color: var(--fenz-red);
            background: transparent;
            border: 1px solid var(--fenz-red);
            padding: 4px 10px;
            cursor: pointer;
            font-family: 'Industry-BoldItalic';
        }

        .btn-remove:hover {
            background: var(--fenz-red);
            color: white;
        }
    </style>
</head>
<body>

    <div class="roster-nav">
        <a href="roster.html" class="nav-item">FIRE ROSTER</a>
        <a href="ntc.html" class="nav-item">NTC ROSTER</a>
        <a href="comms.html" class="nav-item">COMMS ROSTER</a>
        <button class="modify-toggle" onclick="toggleModifier()">MODIFY ROSTER ▾</button>
    </div>

    <div id="modifier-section">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="PERSONNEL NAME">
            
            <select id="pRank">
                <option value="" disabled selected>SELECT RANK</option>
                <optgroup label="Fire Division">
                    <option value="Commander">Commander</option>
                    <option value="Assistant National Commander">Assistant National Commander</option>
                    <option value="Acting Station Officer">Acting Station Officer</option>
                    <option value="Senior Firefighter">Senior Firefighter</option>
                    <option value="Qualified Firefighter">Qualified Firefighter</option>
                    <option value="Firefighter">Firefighter</option>
                    <option value="Rural Crew Leader">Rural Crew Leader</option>
                    <option value="Recruit Firefighter">Recruit Firefighter</option>
                </optgroup>
                <optgroup label="Comms/NTC Division">
                    <option value="Senior Dispatcher">Senior Dispatcher</option>
                    <option value="Dispatcher">Dispatcher</option>
                    <option value="Trainee Dispatcher">Trainee Dispatcher</option>
                    <option value="National Trainer">National Trainer</option>
                </optgroup>
            </select>

            <select id="pType">
                <option value="roster">ROSTER DIVISION</option>
                <option value="ntc">NTC DIVISION</option>
                <option value="comms">COMMS DIVISION</option>
            </select>

            <button class="btn-update" onclick="submitData()">UPDATE DATABASE</button>
        </div>
    </div>

    <table class="master-table">
        <thead>
            <tr>
                <th>NAME</th>
                <th>RANK</th>
                <th>DIVISION</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="master-display"></tbody>
    </table>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // TOGGLE LOGIC
        function toggleModifier() {
            const section = document.getElementById('modifier-section');
            if (section.style.display === "block") {
                section.style.display = "none";
            } else {
                section.style.display = "block";
            }
        }

        // DATABASE LOGIC
        function submitData() {
            const name = document.getElementById('pName').value;
            const rank = document.getElementById('pRank').value;
            const target = document.getElementById('pType').value;

            if (name && rank) {
                db.ref(target + '/').push({ name: name, rank: rank });
                alert("Database Updated");
                document.getElementById('pName').value = "";
            }
        }

        function loadList() {
            const display = document.getElementById('master-display');
            display.innerHTML = "";
            ['roster', 'ntc', 'comms'].forEach(path => {
                db.ref(path + '/').on('value', (snapshot) => {
                    const data = snapshot.val();
                    for (let id in data) {
                        display.innerHTML += `
                            <tr>
                                <td style="color:white; font-weight:bold;">${data[id].name}</td>
                                <td>${data[id].rank}</td>
                                <td style="color: #94a3b8">${path.toUpperCase()}</td>
                                <td><button class="btn-remove" onclick="deleteItem('${path}', '${id}')">REMOVE</button></td>
                            </tr>`;
                    }
                });
            });
        }

        function deleteItem(path, id) {
            if (confirm("Confirm removal?")) {
                db.ref(path + '/' + id).remove();
                location.reload();
            }
        }

        loadList();
    </script>
</body>
</html>
