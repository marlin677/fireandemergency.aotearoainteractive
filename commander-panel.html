<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Command Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #111a2e;
            --row-bg: #162036;
            --border-color: #2d3a54;
        }

        /* Global Font Application */
        * {
            font-family: 'Industry-BoldItalic', sans-serif !important;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
        }

        .admin-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            background: #1a253d;
            color: white;
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .toggle-btn:hover {
            border-color: var(--fenz-yellow);
            background: rgba(255, 237, 0, 0.05);
        }

        .toggle-btn.active {
            background: var(--fenz-red);
            border-color: var(--fenz-red);
        }

        .dropdown-panel {
            display: none;
            background: var(--table-header);
            padding: 25px;
            border-radius: 4px;
            border-top: 3px solid var(--fenz-red);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        input, select, textarea {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: white;
            border-radius: 4px;
            flex: 1;
            min-width: 150px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--fenz-yellow);
        }

        .btn-action {
            background: var(--fenz-yellow);
            color: black;
            border: none;
            padding: 12px 25px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .master-table {
            width: 100%;
            border-collapse: collapse;
        }

        th { 
            text-align: left; 
            padding: 15px; 
            background: var(--table-header); 
            color: #94a3b8; 
            font-size: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }

        td { 
            padding: 15px; 
            background: var(--row-bg); 
            border-bottom: 1px solid var(--border-color);
            transition: 0.2s;
        }

        tr:hover td {
            background: rgba(255, 237, 0, 0.05);
        }
        
        .callsign-tag { 
            color: var(--fenz-yellow); 
            font-weight: bold; 
        }

        .btn-remove {
            color: var(--fenz-red);
            background: transparent;
            border: 1px solid var(--fenz-red);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-remove:hover {
            background: var(--fenz-red);
            color: white;
        }
    </style>
</head>
<body>

    <div class="admin-controls">
        <button class="toggle-btn" id="btn-mod" onclick="toggleSection('modifier-section', 'btn-mod')">ROSTER MODIFIER ▾</button>
        <button class="toggle-btn" id="btn-promo" onclick="toggleSection('promo-section', 'btn-promo')">PENDING PROMOTIONS ▾</button>
    </div>

    <div id="modifier-section" class="dropdown-panel">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="PERSONNEL NAME">
            <input type="text" id="pCallsign" placeholder="CALLSIGN">
            <input type="text" id="pRankText" placeholder="RANK / ROLE">
            <select id="pType">
                <option value="roster">FIRE DIVISION</option>
                <option value="ntc">NTC DIVISION</option>
                <option value="comms">COMMS DIVISION</option>
            </select>
            <button class="btn-action" onclick="submitPersonnel()">UPDATE DATABASE</button>
        </div>
    </div>

    <div id="promo-section" class="dropdown-panel">
        <textarea id="promoText" style="width:100%; min-height:120px;" placeholder="TYPE PENDING PROMOTIONS..."></textarea>
        <button class="btn-action" style="margin-top:10px;" onclick="savePromotions()">SAVE PROMOTIONS</button>
    </div>

    <table class="master-table">
        <thead>
            <tr>
                <th>CALLSIGN</th>
                <th>NAME</th>
                <th>RANK/ROLE</th>
                <th>DIVISION</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="master-display"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleSection(sectionId, btnId) {
            const section = document.getElementById(sectionId);
            const btn = document.getElementById(btnId);
            const isVisible = section.style.display === "block";
            document.querySelectorAll('.dropdown-panel').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            if (!isVisible) { section.style.display = "block"; btn.classList.add('active'); }
        }

        function submitPersonnel() {
            const name = document.getElementById('pName').value;
            const callsign = document.getElementById('pCallsign').value;
            const rank = document.getElementById('pRankText').value;
            const type = document.getElementById('pType').value;
            
            if(name && rank) {
                db.ref(type + '/').push({ 
                    name: name, 
                    callsign: callsign || "N/A", 
                    rank: rank 
                });
                document.getElementById('pName').value = "";
                document.getElementById('pCallsign').value = "";
                document.getElementById('pRankText').value = "";
                alert("Personnel Added.");
            }
        }

        function loadList() {
            const display = document.getElementById('master-display');
            const paths = ['roster', 'ntc', 'comms'];
            
            // Clear display first
            display.innerHTML = "";

            paths.forEach(path => {
                db.ref(path + '/').on('value', (snapshot) => {
                    const data = snapshot.val();
                    // We rebuild the table to ensure data across different paths stays synced
                    refreshTable();
                });
            });
