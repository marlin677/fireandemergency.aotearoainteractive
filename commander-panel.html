<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Command Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #111a2e;
            --row-bg: #162036;
            --border-color: #2d3a54;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
            font-family: 'Industry-BoldItalic', sans-serif;
            text-transform: uppercase;
        }

        /* --- CONTROL BUTTONS --- */
        .admin-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            background: #1a253d;
            color: white;
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            border-radius: 4px;
            font-family: 'Industry-BoldItalic';
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .toggle-btn:hover {
            border-color: var(--fenz-yellow);
            background: rgba(255, 237, 0, 0.05);
        }

        .toggle-btn.active {
            background: var(--fenz-red);
            border-color: var(--fenz-red);
        }

        /* --- DROPDOWN SECTIONS --- */
        .dropdown-panel {
            display: none;
            background: var(--table-header);
            padding: 25px;
            border-radius: 4px;
            border-top: 3px solid var(--fenz-red);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- PROMOTIONS UI --- */
        .promo-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 15px;
            color: white;
            font-family: 'Industry-BoldItalic';
            font-size: 1rem;
            min-height: 150px;
            resize: vertical;
            border-radius: 4px;
        }

        /* --- ROSTER MODIFIER UI --- */
        .form-grid {
            display: flex;
            gap: 10px;
        }

        input, select {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 12px;
            color: white;
            font-family: 'Industry-BoldItalic';
            border-radius: 4px;
            flex: 1;
        }

        .btn-action {
            background: var(--fenz-yellow);
            color: black;
            border: none;
            padding: 12px 25px;
            font-weight: 900;
            font-family: 'Industry-BoldItalic';
            cursor: pointer;
            border-radius: 4px;
        }

        /* --- MASTER TABLE --- */
        .master-table {
            width: 100%;
            border-collapse: collapse;
        }

        th { text-align: left; padding: 15px; background: var(--table-header); color: #94a3b8; font-size: 0.8rem; }
        td { padding: 15px; background: var(--row-bg); border-bottom: 1px solid var(--border-color); }
        
        .btn-remove {
            color: var(--fenz-red);
            background: transparent;
            border: 1px solid var(--fenz-red);
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Industry-BoldItalic';
        }
    </style>
</head>
<body>

    <div class="admin-controls">
        <button class="toggle-btn" id="btn-mod" onclick="toggleSection('modifier-section', 'btn-mod')">ROSTER MODIFIER ▾</button>
        <button class="toggle-btn" id="btn-promo" onclick="toggleSection('promo-section', 'btn-promo')">PENDING PROMOTIONS ▾</button>
    </div>

    <div id="modifier-section" class="dropdown-panel">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="PERSONNEL NAME">
            <select id="pRank">
                <option value="" disabled selected>SELECT RANK</option>
                <option value="Commander">Commander</option>
                <option value="Senior Station Officer">Senior Station Officer</option>
                <option value="Station Officer">Station Officer</option>
                <option value="Firefighter">Firefighter</option>
                <option value="Recruit Firefighter">Recruit Firefighter</option>
                <option value="Senior Dispatcher">Senior Dispatcher</option>
                <option value="Dispatcher">Dispatcher</option>
            </select>
            <select id="pType">
                <option value="roster">FIRE DIVISION</option>
                <option value="ntc">NTC DIVISION</option>
                <option value="comms">COMMS DIVISION</option>
            </select>
            <button class="btn-action" onclick="submitPersonnel()">UPDATE ROSTER</button>
        </div>
    </div>

    <div id="promo-section" class="dropdown-panel">
        <div class="promo-container">
            <textarea id="promoText" placeholder="TYPE PENDING PROMOTIONS HERE..."></textarea>
            <button class="btn-action" style="width: 200px;" onclick="savePromotions()">SAVE PROMOTIONS</button>
        </div>
    </div>

    <table class="master-table">
        <thead>
            <tr>
                <th>NAME</th>
                <th>RANK</th>
                <th>DIVISION</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="master-display"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI TOGGLE
        function toggleSection(sectionId, btnId) {
            const section = document.getElementById(sectionId);
            const btn = document.getElementById(btnId);
            const isVisible = section.style.display === "block";
            
            // Close others
            document.querySelectorAll('.dropdown-panel').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

            if (!isVisible) {
                section.style.display = "block";
                btn.classList.add('active');
            }
        }

        // SAVE PROMOTIONS TO DATABASE
        function savePromotions() {
            const text = document.getElementById('promoText').value;
            db.ref('management/promotions').set({
                list: text,
                lastUpdated: new Date().toLocaleString()
            }).then(() => alert("Promotions Saved Successfully"));
        }

        // LOAD PROMOTIONS ON START
        db.ref('management/promotions/list').on('value', (snap) => {
            if(snap.val()) document.getElementById('promoText').value = snap.val();
        });

        // ROSTER LOGIC
        function submitPersonnel() {
            const name = document.getElementById('pName').value;
            const rank = document.getElementById('pRank').value;
            const type = document.getElementById('pType').value;
            if(name && rank) {
                db.ref(type + '/').push({ name, rank });
                document.getElementById('pName').value = "";
                alert("Personnel Added");
            }
        }

        function loadList() {
            const display = document.getElementById('master-display');
            display.innerHTML = "";
            ['roster', 'ntc', 'comms'].forEach(path => {
                db.ref(path + '/').on('value', (snapshot) => {
                    const data = snapshot.val();
                    for (let id in data) {
                        display.innerHTML += `
                            <tr>
                                <td style="color:white; font-weight:bold;">${data[id].name}</td>
                                <td>${data[id].rank}</td>
                                <td style="color:#94a3b8">${path.toUpperCase()}</td>
                                <td><button class="btn-remove" onclick="deleteItem('${path}', '${id}')">REMOVE</button></td>
                            </tr>`;
                    }
                });
            });
        }

        function deleteItem(path, id) {
            if(confirm("Remove?")) {
                db.ref(path + '/' + id).remove();
                location.reload();
            }
        }

        loadList();
    </script>
</body>
</html>
