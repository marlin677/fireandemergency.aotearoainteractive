<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Personnel Management</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #111a2e;
            --row-bg: #162036;
            --border-color: #2d3a54;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
            font-family: 'Industry-BoldItalic', sans-serif;
            text-transform: uppercase;
        }

        /* --- EMERGENCY TOP BAR --- */
        .emergency-banner {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/marlin677/marlin77.github.io/main/image_62ff55.png');
            background-size: cover;
            background-position: center;
            padding: 15px;
            text-align: right;
            border-bottom: 3px solid var(--fenz-yellow);
            margin: -40px -40px 30px -40px;
        }

        .emergency-text {
            color: white;
            font-size: 0.9rem;
            margin: 0;
        }

        .emergency-number {
            color: var(--fenz-yellow);
            font-size: 1.8rem;
            display: block;
            margin-top: -5px;
        }

        /* --- NAVIGATION --- */
        .roster-nav {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            background: var(--table-header);
            padding: 12px 24px;
            border-radius: 4px;
            transition: 0.3s;
            border: 1px solid var(--border-color);
        }

        .nav-item:hover {
            background: var(--fenz-red);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 32, 39, 0.4);
        }

        /* --- MANAGEMENT FORM --- */
        .admin-card {
            background: var(--table-header);
            padding: 30px;
            border-radius: 6px;
            border-top: 4px solid var(--fenz-red);
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input, select {
            background: #1a253d;
            border: 1px solid var(--border-color);
            padding: 14px;
            color: white;
            font-family: 'Industry-BoldItalic';
            border-radius: 4px;
            outline: none;
        }

        .btn-update {
            background: var(--fenz-yellow);
            color: black;
            border: none;
            padding: 14px;
            cursor: pointer;
            font-weight: 900;
            font-family: 'Industry-BoldItalic';
            transition: 0.3s;
            border-radius: 4px;
        }

        .btn-update:hover {
            background: white;
            transform: scale(1.02);
        }

        /* --- MASTER TABLE --- */
        .master-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--row-bg);
        }

        th { background: var(--table-header); color: #94a3b8; padding: 15px; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); transition: 0.2s; }
        tr:hover td { background: rgba(255, 237, 0, 0.1); color: var(--fenz-yellow); }

        .btn-delete {
            background: transparent;
            color: var(--fenz-red);
            border: 1px solid var(--fenz-red);
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Industry-BoldItalic';
        }
    </style>
</head>
<body>

    <div class="emergency-banner">
        <p class="emergency-text">IN EMERGENCIES</p>
        <span class="emergency-number">Call 111</span>
    </div>

    <nav class="roster-nav">
        <a href="roster.html" class="nav-item">Fire Roster</a>
        <a href="ntc.html" class="nav-item">NTC Roster</a>
        <a href="comms.html" class="nav-item">Comms Roster</a>
    </nav>

    <div class="admin-card">
        <div class="form-grid">
            <input type="text" id="pName" placeholder="PERSONNEL NAME">
            
            <select id="pRank">
                <option value="" disabled selected>SELECT RANK</option>
                <optgroup label="COMCEN (Communication Centre)">
                    <option value="COMCEN | Operations Manager">Operations Manager</option>
                    <option value="COMCEN | Shift Manager">Shift Manager</option>
                    <option value="COMCEN | Senior Dispatcher">Senior Dispatcher</option>
                    <option value="COMCEN | Dispatcher">Dispatcher</option>
                    <option value="COMCEN | Trainee Dispatcher">Trainee Dispatcher</option>
                </optgroup>
                <optgroup label="NTC (Training Centre)">
                    <option value="Head Of National Training Centre">Head Of National Training Centre</option>
                    <option value="Head Of Region 4 Training Centre">Head Of Region 4 Training Centre</option>
                    <option value="National Trainer">National Trainer</option>
                    <option value="Region 4 Trainer">Region 4 Trainer</option>
                </optgroup>
                <optgroup label="Fire Ranks">
                    <option value="Senior Station Officer">Senior Station Officer</option>
                    <option value="Station Officer">Station Officer</option>
                    <option value="Firefighter">Firefighter</option>
                    <option value="Volunteer Firefighter">Volunteer Firefighter</option>
                </optgroup>
            </select>

            <select id="pType">
                <option value="roster">FIRE DIVISION</option>
                <option value="ntc">NTC DIVISION</option>
                <option value="comms">COMMS DIVISION</option>
            </select>

            <button class="btn-update" onclick="submitToFirebase()">UPDATE DATABASE</button>
        </div>
    </div>

    <table class="master-table">
        <thead>
            <tr>
                <th>NAME</th>
                <th>RANK</th>
                <th>DIVISION</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="master-display"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function submitToFirebase() {
            const name = document.getElementById('pName').value;
            const rank = document.getElementById('pRank').value;
            const target = document.getElementById('pType').value;

            if (name && rank) {
                db.ref(target + '/').push({ name: name, rank: rank });
                alert("Personnel Added.");
                document.getElementById('pName').value = "";
            }
        }

        const paths = ['roster', 'ntc', 'comms'];
        function loadList() {
            const display = document.getElementById('master-display');
            display.innerHTML = "";
            paths.forEach(path => {
                db.ref(path + '/').on('value', (snapshot) => {
                    const data = snapshot.val();
                    for (let id in data) {
                        display.innerHTML += `
                            <tr>
                                <td style="color:white; font-weight:bold;">${data[id].name}</td>
                                <td>${data[id].rank}</td>
                                <td>${path.toUpperCase()}</td>
                                <td><button class="btn-delete" onclick="removeEntry('${path}', '${id}')">REMOVE</button></td>
                            </tr>`;
                    }
                });
            });
        }

        function removeEntry(path, id) {
            if (confirm("Remove entry?")) {
                db.ref(path + '/' + id).remove();
                location.reload();
            }
        }

        loadList();
    </script>
</body>
</html>
