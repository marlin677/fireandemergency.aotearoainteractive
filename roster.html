<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Operational Roster</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #080d1a;
            --row-bg: #111a2e;
            --row-alt: #162036;
            --border-color: #2d3a54;
            --neon-glow: rgba(212, 32, 39, 0.4);
        }

        * {
            font-family: 'Industry-BoldItalic', sans-serif !important;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
            background-image: radial-gradient(circle at center, #111a2e 0%, #0b1120 100%);
        }

        .back-btn { 
            color: var(--fenz-yellow); 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 0.9rem; 
            display: inline-block; 
            margin-bottom: 25px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }
        .back-btn:hover { border-bottom: 2px solid var(--fenz-yellow); }

        .roster-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            background: rgba(17, 26, 46, 0.8);
            padding: 14px 30px;
            border-radius: 2px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .nav-item:hover { background: #1e293b; color: white; }

        .nav-item.active {
            background: var(--fenz-red);
            color: white;
            border-color: var(--fenz-red);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .roster-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 4px;
        }

        th {
            background-color: var(--table-header);
            color: #64748b;
            font-size: 0.75rem;
            padding: 20px;
            text-align: left;
            border-bottom: 2px solid var(--fenz-red);
        }

        /* Centered Category Headers */
        .rank-category-row {
            background: linear-gradient(90deg, transparent, var(--fenz-red), transparent) !important;
            color: white !important;
            font-size: 1.2rem !important;
            font-weight: 900 !important;
            letter-spacing: 5px;
            text-align: center !important;
            padding: 25px 0 !important;
            border: none !important;
        }

        tr.member-row:nth-child(even) td { background: var(--row-alt); }
        tr.member-row td { 
            padding: 18px 20px; 
            background: var(--row-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .name-text { color: white; font-size: 1.1rem; }
        .rank-text { color: #94a3b8; font-size: 0.9rem; }
        .callsign-text { color: var(--fenz-yellow); font-weight: 900; font-size: 1rem; }

        .status-badge {
            color: #22c55e;
            border: 1px solid #22c55e;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            background: rgba(34, 197, 94, 0.1);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← RETURN TO COMMAND DASHBOARD</a>

    <nav class="roster-nav">
        <div class="nav-item active" id="btn-fire" onclick="switchRoster('roster', 'btn-fire')">FIRE OPS</div>
        <div class="nav-item" id="btn-ntc" onclick="switchRoster('ntc', 'btn-ntc')">TRAINING (NTC)</div>
        <div class="nav-item" id="btn-comms" onclick="switchRoster('comms', 'btn-comms')">COMMS CENTRE</div>
    </nav>

    <h1 id="roster-title">FIRE ROSTER | PERSONNEL</h1>

    <table class="roster-table">
        <thead>
            <tr>
                <th width="35%">PERSONNEL NAME</th>
                <th width="25%">DESIGNATED RANK</th>
                <th width="20%">DUTY STATUS</th>
                <th width="20%">RADIO CALLSIGN</th>
            </tr>
        </thead>
        <tbody id="personnel-list">
            </tbody>
    </table>

    <script>
        // Use your existing Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const rankCategories = [
            { label: "NATIONAL COMMANDERS", ranks: ["ASSISTANT NATIONAL COMMANDER"] },
            { label: "DISTRICT COMMANDERS", ranks: ["COMMANDER"] },
            { label: "AREA COMMANDERS", ranks: ["ASSISTANT COMMANDER"] },
            { label: "SENIOR STATION OFFICERS", ranks: ["SENIOR STATION OFFICER"] },
            { label: "STATION OFFICERS", ranks: ["STATION OFFICER", "ACTING STATION OFFICER"] },
            { label: "SENIOR FIREFIGHTERS", ranks: ["SENIOR FIREFIGHTER"] },
            { label: "QUALIFIED FIREFIGHTERS", ranks: ["QUALIFIED FIREFIGHTER"] },
            { label: "FIREFIGHTERS", ranks: ["FIREFIGHTER"] },
            { label: "RECRUIT FIREFIGHTERS", ranks: ["RECRUIT FIREFIGHTER"] }
        ];

        function switchRoster(path, btnId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            
            const titleText = path === 'roster' ? 'FIRE' : path;
            document.getElementById('roster-title').innerText = `${titleText} ROSTER | PERSONNEL`;

            db.ref(path + '/').on('value', (snapshot) => {
                const list = document.getElementById('personnel-list');
                list.innerHTML = "";
                const data = snapshot.val();

                if (data) {
                    const members = Object.values(data);

                    rankCategories.forEach(cat => {
                        const filteredMembers = members.filter(m => 
                            m.rank && cat.ranks.includes(m.rank.toUpperCase().trim())
                        );

                        if (filteredMembers.length > 0) {
                            // Centered, Bold Category Heading
                            list.innerHTML += `
                                <tr>
                                    <td colspan="4" class="rank-category-row">
                                        --- ${cat.label} ---
                                    </td>
                                </tr>
                            `;

                            filteredMembers.forEach(member => {
                                list.innerHTML += `
                                    <tr class="member-row">
                                        <td class="name-text">${member.name}</td>
                                        <td class="rank-text">${member.rank}</td>
                                        <td><span class="status-badge">ACTIVE</span></td>
                                        <td class="callsign-text">${member.callsign || 'N/A'}</td>
                                    </tr>
                                `;
                            });
                        }
                    });
                } else {
                    list.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:50px; color:#475569;">NO PERSONNEL DETECTED IN DATABASE</td></tr>`;
                }
            });
        }

        switchRoster('roster', 'btn-fire');
    </script>
</body>
</html>
