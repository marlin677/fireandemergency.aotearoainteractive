<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FENZ | Operational Roster</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <link href="https://db.onlinewebfonts.com/c/30c7488235dccc1b4f5dd8ad33a47ddb?family=Industry-BoldItalic" rel="stylesheet">

    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-blue: #0b1120;
            --table-header: #111a2e;
            --row-bg: #162036;
            --border-color: #2d3a54;
        }

        * {
            font-family: 'Industry-BoldItalic', sans-serif !important;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: var(--dark-blue);
            color: #e2e8f0;
        }

        .back-btn { color: var(--fenz-yellow); text-decoration: none; font-weight: bold; font-size: 0.9rem; display: block; margin-bottom: 15px; }

        .roster-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .nav-item {
            text-decoration: none;
            color: #94a3b8;
            background: var(--table-header);
            padding: 12px 25px;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .nav-item.active {
            background: var(--fenz-red);
            color: white;
            border-bottom: 3px solid var(--fenz-yellow);
        }

        .roster-container { width: 100%; border-collapse: collapse; border: 1px solid var(--border-color); }
        
        /* Category Header Styling */
        .rank-category-row {
            background-color: #1e293b;
            color: var(--fenz-yellow);
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-left: 5px solid var(--fenz-red);
        }

        th { background-color: var(--table-header); color: #94a3b8; font-size: 0.8rem; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); background: var(--row-bg); }
        
        .callsign-text { color: var(--fenz-yellow); font-weight: bold; }
        .name-text { color: white; font-weight: bold; }
        .status-badge { color: #22c55e; border: 1px solid #22c55e; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← BACK TO DASHBOARD</a>

    <nav class="roster-nav">
        <div class="nav-item active" id="btn-fire" onclick="switchRoster('roster', 'btn-fire')">FIRE ROSTER</div>
        <div class="nav-item" id="btn-ntc" onclick="switchRoster('ntc', 'btn-ntc')">NTC ROSTER</div>
        <div class="nav-item" id="btn-comms" onclick="switchRoster('comms', 'btn-comms')">COMMS ROSTER</div>
    </nav>

    <h1 id="roster-title">FIRE ROSTER | PERSONNEL</h1>

    <table class="roster-container">
        <thead>
            <tr>
                <th width="35%">Personnel Name</th>
                <th width="25%">Rank</th>
                <th width="20%">Status</th>
                <th width="20%">Callsign</th>
            </tr>
        </thead>
        <tbody id="personnel-list">
            </tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQaJgS2_Dv86YMRS_T_VNtaptfHyPAhQk",
            authDomain: "rosterproject-dedcb.firebaseapp.com",
            databaseURL: "https://rosterproject-dedcb-default-rtdb.firebaseio.com",
            projectId: "rosterproject-dedcb",
            storageBucket: "rosterproject-dedcb.firebasestorage.app",
            messagingSenderId: "360647207231",
            appId: "1:360647207231:web:e315ade217c113ae664b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Categorization Map
        const rankCategories = [
            { label: "National Commanders", ranks: ["ASSISTANT NATIONAL COMMANDER"] },
            { label: "District Commanders", ranks: ["COMMANDER"] },
            { label: "Area Commanders", ranks: ["ASSISTANT COMMANDER"] },
            { label: "Senior Station Officers", ranks: ["SENIOR STATION OFFICER"] },
            { label: "Station Officers", ranks: ["STATION OFFICER", "ACTING STATION OFFICER"] },
            { label: "Senior Firefighters", ranks: ["SENIOR FIREFIGHTER"] },
            { label: "Qualified Firefighters", ranks: ["QUALIFIED FIREFIGHTER"] },
            { label: "Firefighters", ranks: ["FIREFIGHTER"] },
            { label: "Recruit Firefighters", ranks: ["RECRUIT FIREFIGHTER"] }
        ];

        function switchRoster(path, btnId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
            
            const titleText = path === 'roster' ? 'FIRE' : path;
            document.getElementById('roster-title').innerText = `${titleText} ROSTER | PERSONNEL`;

            db.ref(path + '/').on('value', (snapshot) => {
                const list = document.getElementById('personnel-list');
                list.innerHTML = "";
                const data = snapshot.val();

                if (data) {
                    const members = Object.values(data);

                    rankCategories.forEach(cat => {
                        // Filter members belonging to this rank group
                        const filteredMembers = members.filter(m => 
                            m.rank && cat.ranks.includes(m.rank.toUpperCase().trim())
                        );

                        if (filteredMembers.length > 0) {
                            // Add Category Heading
                            list.innerHTML += `
                                <tr>
                                    <td colspan="4" class="rank-category-row">
                                        ${cat.label}
                                    </td>
                                </tr>
                            `;

                            // Add Members for this rank
                            filteredMembers.forEach(member => {
                                list.innerHTML += `
                                    <tr>
                                        <td class="name-text">${member.name}</td>
                                        <td style="color:#94a3b8">${member.rank}</td>
                                        <td><span class="status-badge">ACTIVE</span></td>
                                        <td class="callsign-text">${member.callsign || 'N/A'}</td>
                                    </tr>
                                `;
                            });
                        }
                    });
                } else {
                    list.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:#475569;">NO PERSONNEL ASSIGNED</td></tr>`;
                }
            });
        }

        // Default Load
        switchRoster('roster', 'btn-fire');
    </script>
</body>
</html>
