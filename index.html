<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal | FENZ Style</title>
    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-bg: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- HEADER & LOGO --- */
        .header-main {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 5%;
            z-index: 100;
        }

        .logo-box {
            background-color: var(--fenz-red);
            border-bottom: 6px solid var(--fenz-yellow);
            width: 200px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .emergency-contact {
            text-align: right;
            line-height: 1;
        }

        .emergency-label {
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .emergency-number {
            font-size: 2.5rem;
            color: var(--fenz-yellow);
            font-weight: 900;
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background image with dark overlay to make text pop */
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://www.fireandemergency.nz/assets/Uploads/FENZ-House_Burn_Levin-Hass_0084.jpg');
            background-size: cover;
            background-position: center;
            border-bottom: 12px solid var(--fenz-red);
        }

        .hero-container {
            width: 90%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-text h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            line-height: 0.85;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .btn-safety {
            display: inline-block;
            margin-top: 40px;
            background-color: var(--fenz-yellow);
            color: black;
            padding: 18px 40px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            transform: skewX(-15deg);
            transition: 0.2s;
        }

        .btn-safety span {
            display: inline-block;
            transform: skewX(15deg);
        }

        .btn-safety:hover {
            background-color: white;
            padding-left: 50px;
        }
